name: Lint

on:
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/**"
      - ".gitleaks.toml"
      - ".github/workflows/lint.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/**"
      - ".gitleaks.toml"
      - ".github/workflows/lint.yml"

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      CC: clang
      CXX: clang++
      SC_CLANG_TIDY_REQUIRED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            clang-tidy \
            cmake \
            cppcheck \
            curl \
            git \
            libcurl4-openssl-dev \
            libsodium-dev \
            libsqlite3-dev \
            libuv1-dev \
            pkg-config \
            zlib1g-dev

      - name: Run Ruff
        run: uv run --project tools --locked ruff check tools

      - name: Run C static analysis
        run: SC_STATIC_SKIP_RUFF=1 make static PYTHON="uv run --project tools --locked python"

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "${archive}" -C "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Scan tracked content for secrets
        run: gitleaks git --no-banner --redact --verbose
