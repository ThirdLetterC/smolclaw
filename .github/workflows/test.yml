name: Test

on:
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/test.yml"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      CC: clang
      CXX: clang++
      CTEST_OUTPUT_ON_FAILURE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            git \
            libcurl4-openssl-dev \
            libsodium-dev \
            libsqlite3-dev \
            libuv1-dev \
            ninja-build \
            pkg-config \
            zlib1g-dev

      - name: Run tests
        run: make test

  sanitizer:
    name: ASan, UBSan, and LSan
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      CC: clang
      CXX: clang++
      CTEST_OUTPUT_ON_FAILURE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake git libcurl4-openssl-dev libsodium-dev \
            libsqlite3-dev libuv1-dev ninja-build pkg-config zlib1g-dev

      - name: Run sanitizer tests
        run: make sanitizer

      - name: Build URL fuzz target
        run: |
          cmake -S . -B build/fuzz -DCMAKE_BUILD_TYPE=Debug \
            -DSC_DEPS_PROVIDER=system -DSC_FUZZING=ON -DSC_HARDENING=OFF
          cmake --build build/fuzz --target sc_fuzz_url --parallel "$(nproc)"

      - name: Run URL fuzz smoke
        run: build/fuzz/sc_fuzz_url -max_total_time=30 -max_len=4096
