name: Test

on:
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/validation/**"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.cpp"
      - "**/*.hpp"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "tests/**"
      - "tools/validation/**"
      - ".github/workflows/test.yml"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      CC: clang
      CXX: clang++
      CTEST_OUTPUT_ON_FAILURE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            git \
            libcurl4-openssl-dev \
            libsodium-dev \
            libsqlite3-dev \
            libuv1-dev \
            ninja-build \
            pkg-config \
            zlib1g-dev

      - name: Run tests
        run: make test
